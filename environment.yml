name: hoi_recon
# Core environment is intentionally LIGHT so that `mock` mode runs anywhere
# (no GPU, no model weights). For REAL mode (GPU), after creating this env run:
#   bash scripts/setup_third_party.sh    # clone model repos
#   bash scripts/setup_real.sh           # torch(cu128)+MoGe+SAM2+ultralytics+HaMeR deps
#   bash scripts/download_checkpoints.sh # fetch weights (MANO is license-gated)
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - numpy>=1.24
  - scipy>=1.10
  - pyyaml>=6.0
  - tqdm>=4.65
  - matplotlib>=3.7
  - pip:
      - opencv-python>=4.8
      - imageio>=2.31
      - imageio-ffmpeg>=0.4
      - trimesh>=4.0
      - viser>=1.0          # interactive 4D HOI web viewer (hoi-recon-view)
      - -e .
